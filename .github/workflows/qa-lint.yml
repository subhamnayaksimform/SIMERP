name: QA lint

on:
  pull_request:
    paths:
      - 'tests/**'
      - 'scripts/**'
      - '.claude/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint:tests
